<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayClear — Payroll Engine</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--panel:#181c27;--card:#1e2235;--border:#2a2f45;
  --accent:#3d7fff;--accent2:#00d4aa;--warn:#f59e0b;--danger:#ef4444;--success:#22c55e;
  --text:#e8eaf0;--muted:#6b7280;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px;fill:white}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-left:4px}
.header-right{display:flex;align-items:center;gap:10px}
.lang-btn{font-family:var(--mono);font-size:10px;color:var(--text);border:1px solid var(--border);background:transparent;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all 0.15s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.header-badge{font-family:var(--mono);font-size:10px;color:var(--accent2);border:1px solid var(--accent2);padding:3px 8px;border-radius:4px;opacity:0.8}
.ai-badge{font-family:var(--mono);font-size:10px;color:#a78bfa;border:1px solid #a78bfa;padding:3px 8px;border-radius:4px;opacity:0.9}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-section{padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.sidebar-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:0.75rem}
.content{flex:1;overflow-y:auto;padding:1.75rem 2rem}

/* Upload */
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:1.1rem 1rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--card);position:relative;margin-bottom:0.5rem}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(61,127,255,0.05)}
.upload-zone.loaded{border-color:rgba(34,197,94,0.4);border-style:solid}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:22px;height:22px;margin:0 auto 0.4rem;opacity:0.35}
.upload-text{font-size:11px;color:var(--muted);line-height:1.5}
.upload-text strong{color:var(--text);font-weight:500}
.upload-label-tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;margin-bottom:4px}
.tag-master{background:rgba(61,127,255,0.15);color:#7aaeff}
.tag-clock{background:rgba(0,212,170,0.15);color:var(--accent2)}
.file-ok{font-size:10px;font-family:var(--mono);color:var(--success);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Params */
.param-row{margin-bottom:0.75rem}
.param-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
.param-val{font-family:var(--mono);color:var(--accent);font-size:11px}
input[type=range]{width:100%;accent-color:var(--accent);height:4px;border-radius:2px}
.param-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none}
.param-input:focus{border-color:var(--accent)}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:0.55rem 1rem;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;width:100%;font-family:var(--sans)}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#2d6fe0}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-success{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.3)}
.btn-success:hover{background:rgba(34,197,94,0.22)}
.btn-ai{background:rgba(167,139,250,0.12);color:#c4b5fd;border:1px solid rgba(167,139,250,0.35)}
.btn-ai:hover{background:rgba(167,139,250,0.22)}
.btn-ai:disabled,.btn-primary:disabled{opacity:0.45;cursor:not-allowed}
.btn+.btn{margin-top:0.4rem}

/* CPF table */
.cpf-table{width:100%;border-collapse:collapse;font-size:10px;font-family:var(--mono)}
.cpf-table th{text-align:left;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);font-weight:500}
.cpf-table th:not(:first-child){text-align:right;padding-right:4px}
.cpf-table td{padding:4px 0;color:var(--text)}
.cpf-table td:not(:first-child){text-align:right;padding-right:4px}
.cpf-table tr.sep td{border-top:1px solid var(--border)}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem}
.stat-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}
.stat-val.warn{color:var(--warn)}.stat-val.danger{color:var(--danger)}.stat-val.ok{color:var(--success)}

/* Action cards */
.action-section{margin-bottom:1.5rem}
.action-header{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.6rem}
.action-cards{display:flex;flex-direction:column;gap:0.5rem}
.action-card{display:flex;align-items:flex-start;gap:10px;padding:0.75rem 1rem;border-radius:10px;border:1px solid}
.action-card.danger{background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.25)}
.action-card.warn{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.25)}
.action-card.ok{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.2)}
.action-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.action-card.danger .action-dot{background:var(--danger)}
.action-card.warn .action-dot{background:var(--warn)}
.action-card.ok .action-dot{background:var(--success)}
.action-title{font-size:12px;font-weight:600;margin-bottom:2px}
.action-card.danger .action-title{color:#f87171}
.action-card.warn .action-title{color:#fbbf24}
.action-card.ok .action-title{color:#4ade80}
.action-desc{font-size:11px;color:var(--muted);line-height:1.55}
.action-desc strong{color:var(--text)}

/* AI panel */
.ai-panel{background:var(--card);border:1px solid rgba(167,139,250,0.3);border-radius:12px;margin-bottom:1.5rem;overflow:hidden}
.ai-panel-header{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1.1rem;border-bottom:1px solid rgba(167,139,250,0.15)}
.ai-panel-title{font-size:13px;font-weight:600;color:#c4b5fd}
.ai-body{padding:1rem 1.1rem;font-size:13px;line-height:1.8;color:var(--text)}
.ai-body.loading{color:var(--muted);font-family:var(--mono);font-size:12px}
.ai-body p{margin-bottom:0.6rem}.ai-body p:last-child{margin-bottom:0}
.ai-body strong{color:#e9d5ff;font-weight:600}
.ai-cursor{display:inline-block;width:8px;height:14px;background:#a78bfa;margin-left:2px;vertical-align:middle;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;border-radius:6px 6px 0 0;color:var(--muted);transition:all 0.15s;border:1px solid transparent;border-bottom:none;margin-bottom:-1px}
.tab.active{color:var(--text);background:var(--card);border-color:var(--border);border-bottom-color:var(--card)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Filter */
.filter-bar{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.1rem;flex-wrap:wrap}
.filter-bar input,.filter-bar select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;outline:none}
.filter-bar input{flex:1;min-width:130px}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--panel)}
th{padding:8px 12px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(42,47,69,0.5);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.mono{font-family:var(--mono);font-size:11px}
.emp-name{font-weight:500;font-size:12px}
.emp-id{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
.dept-badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:rgba(61,127,255,0.12);color:#7aaeff}
.alert-list{display:flex;flex-direction:column;gap:3px}
.alert-item{font-size:10px;padding:2px 6px;border-radius:4px;line-height:1.5;font-family:var(--mono)}
.alert-warn{background:rgba(245,158,11,0.12);color:#fbbf24;border-left:2px solid #f59e0b}
.alert-danger{background:rgba(239,68,68,0.12);color:#f87171;border-left:2px solid #ef4444}
.alert-ok{background:rgba(34,197,94,0.08);color:#4ade80;border-left:2px solid #22c55e}
.hours-bar{height:4px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden}
.hours-bar-fill{height:100%;border-radius:2px;background:var(--accent2)}
.hours-bar-fill.warn{background:var(--warn)}
.hours-bar-fill.danger{background:var(--danger)}

/* Clock log table */
.log-tag{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px}
.log-al{background:rgba(61,127,255,0.15);color:#7aaeff}
.log-sl{background:rgba(245,158,11,0.15);color:#fbbf24}
.log-abs{background:rgba(239,68,68,0.12);color:#f87171}
.log-wknd{background:rgba(167,139,250,0.12);color:#c4b5fd}
.log-norm{background:rgba(34,197,94,0.08);color:#4ade80}

/* Empty */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.2}
.empty-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:0.5rem}
.empty-sub{font-size:13px;line-height:1.7}
.empty-sub code{font-family:var(--mono);font-size:11px;background:var(--card);padding:1px 6px;border-radius:4px;color:var(--accent2)}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e2235;border:1px solid var(--accent2);border-radius:8px;padding:0.65rem 1rem;font-size:12px;color:var(--accent2);font-family:var(--mono);z-index:999;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem}
.section-title{font-size:13px;font-weight:600}
.section-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.mom-note{background:rgba(61,127,255,0.06);border:1px solid rgba(61,127,255,0.2);border-radius:7px;padding:0.55rem 0.8rem;font-size:10px;color:#7aaeff;line-height:1.65;margin-top:0.6rem}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M2 2h5v5H2zm7 0h5v5H9zm0 7h5v5H9zM2 9h5v5H2z"/></svg></div>
    <span class="logo-text">PayClear</span>
    <span class="logo-sub">/ Payroll Engine</span>
  </div>
  <div class="header-right">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">中文</button>
    <span class="ai-badge">✦ AI Analyst</span>
    <span class="header-badge">SG · MOM Compliant</span>
  </div>
</header>

<div class="main">
<aside class="sidebar" id="sidebar"></aside>
<main class="content">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">▦</div>
    <div class="empty-title" id="emptyTitle"></div>
    <div class="empty-sub" id="emptySub"></div>
  </div>
  <div id="resultArea" style="display:none">
    <div class="stats-bar" id="statsBar"></div>
    <div class="action-section" id="actionSection"></div>
    <div class="ai-panel" id="aiPanel" style="display:none">
      <div class="ai-panel-header">
        <div class="ai-panel-title" id="aiPanelTitle"></div>
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono)">Powered by Claude</span>
      </div>
      <div class="ai-body" id="aiBody"></div>
    </div>
    <!-- Tabs -->
    <div class="tab-bar" id="tabBar"></div>
    <!-- Payroll tab -->
    <div class="tab-pane active" id="pane-payroll">
      <div class="filter-bar">
        <input type="text" id="searchInput" oninput="renderPayrollTable()">
        <select id="deptFilter" onchange="renderPayrollTable()"></select>
        <select id="alertFilter" onchange="renderPayrollTable()"></select>
      </div>
      <div class="section-head">
        <span class="section-title" id="tableTitle"></span>
        <span class="section-count" id="rowCount"></span>
      </div>
      <div class="table-wrap">
        <table><thead id="payrollHead"></thead><tbody id="payrollBody"></tbody></table>
      </div>
    </div>
    <!-- Clock log tab -->
    <div class="tab-pane" id="pane-clocklog">
      <div class="filter-bar">
        <input type="text" id="logSearch" placeholder="Search employee…" oninput="renderClockLog()">
        <select id="logEmpFilter" onchange="renderClockLog()"></select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr id="clockLogHead"></tr></thead>
          <tbody id="clockLogBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>

// Apr 2025: workdays Mon-Fri. Generate realistic clock records.
// Absences/leaves encoded as clock_in='AL', clock_out='AL' or 'SL'
function genSampleClock(){
  const rows=[];
  // workdays in Apr 2025 (Mon-Fri, skip weekends)
  const days=[];
  for(let d=1;d<=30;d++){
    const dt=new Date(2025,3,d);
    if(dt.getDay()>=1&&dt.getDay()<=5) days.push(`2025-04-${String(d).padStart(2,'0')}`);
  }
  // Per-employee patterns
  const patterns={
    // E001: normal, 1 AL day
    E001: days.map((d,i)=>i===3?{ci:'AL',co:'AL'}:{ci:'08:55',co:'18:10'}),
    // E002: works late most days (high OT), 2 AL
    E002: days.map((d,i)=>i===6||i===12?{ci:'AL',co:'AL'}:i%3===0?{ci:'08:50',co:'21:30'}:{ci:'09:00',co:'20:45'}),
    // E003: very high OT — near limit, weekend work
    E003: days.map((d,i)=>i%2===0?{ci:'08:00',co:'20:00'}:{ci:'08:30',co:'19:30'}),
    // E004: older employee, leaves on time mostly, 1 SL
    E004: days.map((d,i)=>i===8?{ci:'SL',co:'SL'}:{ci:'09:05',co:'17:55'}),
    // E005: high OT hitting limit
    E005: days.map((d,i)=>i===1||i===14?{ci:'AL',co:'AL'}:i%2===0?{ci:'08:00',co:'21:00'}:{ci:'08:30',co:'20:30'}),
    // E006: junior, some uncounted absences + OT
    E006: days.map((d,i)=>i===5||i===16?{ci:null,co:null}:i%3===0?{ci:'08:30',co:'20:00'}:{ci:'09:10',co:'18:30'}),
    // E007: senior, mostly normal, 3 AL
    E007: days.map((d,i)=>i===2||i===9||i===17?{ci:'AL',co:'AL'}:{ci:'08:45',co:'18:15'}),
    // E008: normal with moderate OT
    E008: days.map((d,i)=>i%4===0?{ci:'08:30',co:'20:00'}:{ci:'09:00',co:'18:00'}),
    // E009: 2 SL days
    E009: days.map((d,i)=>i===4||i===5?{ci:'SL',co:'SL'}:{ci:'08:55',co:'18:20'}),
    // E010: moderate OT, 1 AL
    E010: days.map((d,i)=>i===10?{ci:'AL',co:'AL'}:i%3===0?{ci:'08:00',co:'19:30'}:{ci:'09:00',co:'18:30'}),
  };
  // Add weekend OT for E003 and E005
  ['2025-04-05','2025-04-12','2025-04-19','2025-04-26'].forEach(wkd=>{
    patterns.E003.push({ci:'09:00',co:'17:00',_date:wkd,_wknd:true});
    if(['2025-04-05','2025-04-12'].includes(wkd))
      patterns.E005.push({ci:'09:00',co:'16:00',_date:wkd,_wknd:true});
  });
  Object.entries(patterns).forEach(([eid,recs])=>{
    recs.forEach((r,i)=>{
      const date=r._date||days[i];
      if(!date)return;
      rows.push({emp_id:eid,date,clock_in:r.ci||'',clock_out:r.co||''});
    });
  });
  return rows;
}

// File parsing
// ══════════════════════════════════════════════════════════════
function handleFile(input,type){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    const r=new FileReader();
    r.onload=e=>parseCSV(e.target.result,type,file.name);
    r.readAsText(file);
  } else {
    const r=new FileReader();
    r.onload=e=>parseXLSX(e.target.result,type,file.name);
    r.readAsArrayBuffer(file);
  }
}
function parseCSV(text,type,fname){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/ /g,'_'));
  const rows=lines.slice(1).map(line=>{
    const vals=line.split(',');const obj={};
    headers.forEach((h,i)=>{
      const v=(vals[i]||'').trim();
      obj[h]=isNaN(v)||v===''?v:parseFloat(v);
    });
    return obj;
  }).filter(r=>Object.values(r).some(v=>v!==''));
  storeData(rows,type,fname);
}
function parseXLSX(buffer,type,fname){
  const wb=XLSX.read(buffer,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{defval:''});
  const rows=data.map(row=>{const n={};Object.keys(row).forEach(k=>{n[k.toLowerCase().replace(/ /g,'_')]=row[k];});return n;});
  storeData(rows,type,fname);
}
function storeData(rows,type,fname){
  if(type==='master'){masterData=rows;masterLoaded=true;}
  else{clockData=rows;clockLoaded=true;}
  renderSidebar();
  showToast(`✓ ${fname} loaded — ${rows.length} rows`);
}

// CPF
// ══════════════════════════════════════════════════════════════
function getCPF(age){
  if(age<55)return{er:0.17,ee:0.20};
  if(age<60)return{er:0.15,ee:0.16};
  if(age<65)return{er:0.115,ee:0.10};
  if(age<70)return{er:0.09,ee:0.075};
  return{er:0.075,ee:0.05};
}

// ══════════════════════════════════════════════════════════════
// Core calculation engine
// ══════════════════════════════════════════════════════════════
function calculate(){
  if(!masterLoaded||!clockLoaded){showToast(s('t_needBoth'));return;}

  // Index clock records by emp_id
  const clockByEmp={};
  clockData.forEach(r=>{
    if(!clockByEmp[r.emp_id])clockByEmp[r.emp_id]=[];
    clockByEmp[r.emp_id].push(r);
  });

  // Get all weekdays in selected month
  const [yr,mo]=params.month.split('-').map(Number);
  const workdays=[];
  for(let d=1;d<=31;d++){
    const dt=new Date(yr,mo-1,d);
    if(dt.getMonth()!==mo-1)break;
    workdays.push({date:`${params.month}-${String(d).padStart(2,'0')}`,dow:dt.getDay()});
  }

  clockLog=[];
  processed=masterData.map(emp=>{
    const recs=clockByEmp[emp.emp_id]||[];
    const recByDate={};
    recs.forEach(r=>recByDate[r.date]=r);

    let totalOT=0, normalHours=0;
    let alUsed=0, slUsed=0, absences=0;
    const logRows=[];

    workdays.forEach(({date,dow})=>{
      const rec=recByDate[date];
      const isWeekend=(dow===0||dow===6);
      const ci=rec?.clock_in||'';
      const co=rec?.clock_out||'';

      let type='', hours=0, ot=0;

      if(!rec||(!ci&&!co)){
        // No record
        if(isWeekend){type='weekend';}
        else{type='absent'; absences++;}
      } else if(ci==='AL'||co==='AL'){
        type='AL'; alUsed++;
      } else if(ci==='SL'||co==='SL'){
        type='SL'; slUsed++;
      } else if(ci&&co){
        // Parse times
        const [ch,cm]=ci.split(':').map(Number);
        const [oh,om]=co.split(':').map(Number);
        hours=((oh*60+om)-(ch*60+cm))/60;
        if(isWeekend){
          type='weekend_work'; ot=hours; totalOT+=ot;
        } else {
          type='normal';
          const std=params.stdHours;
          if(hours>std){ot=parseFloat((hours-std).toFixed(2));totalOT+=ot;}
          normalHours+=Math.min(hours,std);
        }
      }

      if(!isWeekend||type==='weekend_work'){
        logRows.push({emp_id:emp.emp_id,name:emp.name,date,dow,ci:ci||'—',co:co||'—',hours:parseFloat(hours.toFixed(2)),type,ot:parseFloat(ot.toFixed(2))});
      }
    });

    clockLog.push(...logRows);
    totalOT=parseFloat(totalOT.toFixed(2));

    const basic=parseFloat(emp.basic_salary)||0;
    const age=parseFloat(emp.age)||35;
    const alEnt=parseFloat(emp.al_entitlement)||14;
    const slEnt=parseFloat(emp.sl_entitlement)||14;
    const cpf=getCPF(age);
    const cap=Math.min(basic,6800);
    const cpfEr=basic<500?0:cap*cpf.er;
    const cpfEe=basic<500?0:cap*cpf.ee;
    const otPay=(basic/26/params.stdHours)*totalOT*params.ot;
    const grossPay=basic+otPay;
    const netPay=grossPay-cpfEe;
    const alRemaining=alEnt-alUsed;
    const otRemaining=parseFloat((params.otLimit-totalOT).toFixed(2));

    const alerts=buildAlerts(totalOT,otRemaining,alUsed,alEnt,slUsed,slEnt,alRemaining,absences,basic);
    const worstLevel=alerts.some(a=>a.level==='danger')?'danger':alerts.some(a=>a.level==='warn')?'warn':'ok';

    return{
      emp_id:emp.emp_id,name:emp.name,dept:emp.dept||'—',
      age,basic,
      totalOT,otPay,cpfEr,cpfEe,grossPay,netPay,
      alUsed,alEnt,alRemaining,slUsed,slEnt,absences,
      normalHours:parseFloat(normalHours.toFixed(1)),
      otRemaining,alerts,worstLevel
    };
  });

  renderAll();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('resultArea').style.display='block';
  document.getElementById('aiPanel').style.display='none';
  showToast(s('t_calc',processed.length));
}

function buildAlerts(otH,otRem,alU,alT,slU,slT,alRem,abs,basic){
  const lim=params.otLimit; const alerts=[];
  if(otH>lim) alerts.push({level:'danger',msg:s('a_otOver',otH,lim,parseFloat((otH-lim).toFixed(1)))});
  else if(Math.abs(otRem)<0.01) alerts.push({level:'danger',msg:s('a_otMax',lim)});
  else if(otRem<=3) alerts.push({level:'danger',msg:s('a_ot3',otRem,otH,lim)});
  else if(otRem<=5) alerts.push({level:'warn',msg:s('a_ot5',otRem,otH)});
  else if(otRem<=10) alerts.push({level:'warn',msg:s('a_ot10',otRem,otH,lim)});
  if(abs>0) alerts.push({level:'warn',msg:s('a_absent',abs)});
  if(alU>alT) alerts.push({level:'danger',msg:s('a_alOver',alU,alT)});
  if(slU>slT) alerts.push({level:'danger',msg:s('a_slOver',slU,slT)});
  if(alRem>=0&&alRem<=3&&alU<=alT) alerts.push({level:'warn',msg:s('a_alLow',alRem)});
  if(basic>0&&basic<1600) alerts.push({level:'warn',msg:s('a_pwm')});
  if(alerts.length===0) alerts.push({level:'ok',msg:s('a_ok')});
  return alerts;
}

  const tc=processed.reduce((a,r)=>a+r.cpfEr,0);
  const dc=processed.filter(r=>r.worstLevel==='danger').length;
  const wc=processed.filter(r=>r.worstLevel==='warn').length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-label">${s('statPayroll')}</div><div class="stat-val">$${Math.round(tp).toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">${s('statCPF')}</div><div class="stat-val">$${Math.round(tc).toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">${s('statDanger')}</div><div class="stat-val ${dc>0?'danger':'ok'}">${dc}</div></div>
    <div class="stat-card"><div class="stat-label">${s('statWarn')}</div><div class="stat-val ${wc>0?'warn':'ok'}">${wc}</div></div>`;
}

function renderActionCards(){
  const dangers=processed.filter(r=>r.worstLevel==='danger');
  const warns=processed.filter(r=>r.worstLevel==='warn');
  let html='';
  if(dangers.length){
    const items=dangers.map(r=>{const a=r.alerts.find(x=>x.level==='danger');return `<strong>${r.name}</strong>: ${a?a.msg:'see details'}`;}).join('<br>');
    html+=`<div class="action-card danger"><div class="action-dot"></div><div><div class="action-title">${s('dangerTitle',dangers.length)}</div><div class="action-desc">${items}</div></div></div>`;
  }
  if(warns.length){
    html+=`<div class="action-card warn"><div class="action-dot"></div><div><div class="action-title">${s('warnTitle',warns.length)}</div><div class="action-desc">${warns.map(r=>`<strong>${r.name}</strong> (${r.dept})`).join(' · ')}</div></div></div>`;
  }
  if(!dangers.length&&!warns.length){
    html+=`<div class="action-card ok"><div class="action-dot"></div><div><div class="action-title">${s('okTitle')}</div><div class="action-desc">${s('okDesc',processed.length)}</div></div></div>`;
  }
  document.getElementById('actionSection').innerHTML=`<div class="action-header">${s('actionHeader')}</div><div class="action-cards">${html}</div>`;
}

function renderTabBar(){
  document.getElementById('tabBar').innerHTML=
    `<div class="tab ${activeTab==='payroll'?'active':''}" onclick="switchTab('payroll')">${s('tabPayroll')}</div>
     <div class="tab ${activeTab==='clocklog'?'active':''}" onclick="switchTab('clocklog')">${s('tabClock')}</div>`;
}
function switchTab(t){
  activeTab=t;
  document.getElementById('pane-payroll').classList.toggle('active',t==='payroll');
  document.getElementById('pane-clocklog').classList.toggle('active',t==='clocklog');
  renderTabBar();
}

function renderFiltersUI(){
  const si=document.getElementById('searchInput');if(si)si.placeholder=s('searchPh');
  const df=document.getElementById('deptFilter');
  if(df){
    const cur=df.value;
    const depts=processed.length?[...new Set(processed.map(r=>r.dept))].sort():[];
    df.innerHTML=`<option value="">${s('deptAll')}</option>`+depts.map(d=>`<option${d===cur?' selected':''}>${d}</option>`).join('');
  }
  const af=document.getElementById('alertFilter');
  if(af){
    const cur=af.value;
    af.innerHTML=`<option value="">${s('statusAll')}</option>
      <option value="danger"${cur==='danger'?' selected':''}>${s('s_danger')}</option>
      <option value="warn"${cur==='warn'?' selected':''}>${s('s_warn')}</option>
      <option value="ok"${cur==='ok'?' selected':''}>${s('s_ok')}</option>`;
  }
  const tt=document.getElementById('tableTitle');if(tt)tt.textContent=s('tableTitle');
  document.getElementById('payrollHead').innerHTML=`<tr>${s('th').map(h=>`<th>${h}</th>`).join('')}</tr>`;
  const clh=document.getElementById('clockLogHead');
  if(clh)clh.innerHTML=s('clTh').map(h=>`<th>${h}</th>`).join('');
}

function renderPayrollTable(){
  const search=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const dept=document.getElementById('deptFilter')?.value||'';
  const alertF=document.getElementById('alertFilter')?.value||'';
  const filtered=processed.filter(r=>{
    if(search&&!r.name.toLowerCase().includes(search)&&!r.emp_id.toLowerCase().includes(search))return false;
    if(dept&&r.dept!==dept)return false;
    if(alertF&&r.worstLevel!==alertF)return false;
    return true;
  });
  document.getElementById('rowCount').textContent=`${filtered.length} / ${processed.length}`;
  const otMax=params.otLimit;
  document.getElementById('payrollBody').innerHTML=filtered.map(r=>{
    const pct=Math.min(100,Math.round(r.totalOT/otMax*100));
    const barCls=r.totalOT>otMax?'danger':r.totalOT>=otMax-5?'warn':'';
    return`<tr>
      <td><div class="emp-name">${r.name}</div><div class="emp-id">${r.emp_id}</div></td>
      <td><span class="dept-badge">${r.dept}</span></td>
      <td class="mono" style="color:var(--muted)">${s('ageUnit',r.age)}</td>
      <td class="mono">$${r.basic.toLocaleString()}</td>
      <td><div class="mono" style="color:${r.totalOT>otMax?'var(--danger)':r.totalOT>=otMax-3?'var(--warn)':'inherit'}">${r.totalOT}h</div><div class="hours-bar"><div class="hours-bar-fill ${barCls}" style="width:${Math.min(pct,100)}%"></div></div><div style="font-size:9px;color:var(--muted);margin-top:1px">${r.totalOT>otMax?'⚠ +'+(r.totalOT-otMax).toFixed(1)+'h over cap':pct+'% of '+otMax+'h cap'}</div></td>
      <td class="mono">$${Math.round(r.otPay).toLocaleString()}</td>
      <td class="mono">$${Math.round(r.cpfEr).toLocaleString()}</td>
      <td class="mono" style="color:var(--accent2);font-weight:600">$${Math.round(r.netPay).toLocaleString()}</td>
      <td class="mono">${r.alUsed}d / ${r.alEnt}d</td>
      <td class="mono">${r.slUsed}d / ${r.slEnt}d</td>
      <td class="mono" style="color:${r.absences>0?'var(--warn)':'var(--muted)'}">${r.absences>0?r.absences+'d':'—'}</td>
      <td><div class="alert-list">${r.alerts.map(a=>`<div class="alert-item alert-${a.level}">${a.msg}</div>`).join('')}</div></td>
    </tr>`;
  }).join('');
}

function renderClockLog(){
  const empF=document.getElementById('logEmpFilter')?.value||'';
  const search=(document.getElementById('logSearch')?.value||'').toLowerCase();
  // Populate emp filter
  const lef=document.getElementById('logEmpFilter');
  if(lef&&!lef.dataset.built){
    const emps=[...new Set(clockLog.map(r=>r.emp_id))];
    lef.innerHTML=`<option value="">All Employees</option>`+emps.map(e=>{
      const emp=masterData.find(m=>m.emp_id===e);
      return`<option value="${e}">${emp?emp.name:e}</option>`;
    }).join('');
    lef.dataset.built='1';
  }
  const rows=clockLog.filter(r=>{
    if(empF&&r.emp_id!==empF)return false;
    if(search&&!r.name.toLowerCase().includes(search)&&!r.emp_id.includes(search))return false;
    return true;
  });
  const typeMap={normal:'log-norm',AL:'log-al',SL:'log-sl',absent:'log-abs',weekend_work:'log-wknd'};
  const typeLabel=lang==='zh'?{normal:'正常上班',AL:'年假',SL:'病假',absent:'缺勤',weekend_work:'周末加班'}:{normal:'Regular',AL:'Annual Leave',SL:'Sick Leave',absent:'Absent',weekend_work:'Weekend OT'};
  document.getElementById('clockLogBody').innerHTML=rows.map(r=>`<tr>
    <td class="mono">${r.date}</td>
    <td class="mono" style="color:var(--muted)">${s('dayNames')[r.dow]}</td>
    <td class="mono">${r.ci}</td>
    <td class="mono">${r.co}</td>
    <td class="mono">${r.hours>0?r.hours+'h':'—'}</td>
    <td><span class="log-tag ${typeMap[r.type]||'log-abs'}">${typeLabel[r.type]||r.type}</span></td>
    <td class="mono" style="color:${r.ot>0?'var(--accent2)':'var(--muted)'}">${r.ot>0?'+'+r.ot+'h':'—'}</td>
  </tr>`).join('');
}

// ══════════════════════════════════════════════════════════════
// AI Analysis — rule-based engine + optional Claude API
// ══════════════════════════════════════════════════════════════

function buildAnalysis(){
  const isZh=lang==='zh';
  const tp  =Math.round(processed.reduce((a,r)=>a+r.grossPay,0));
  const tCPF=Math.round(processed.reduce((a,r)=>a+r.cpfEr,0));
  const tot =Math.round(processed.reduce((a,r)=>a+r.otPay,0));
  const otPct=tp>0?Math.round(tot/tp*100):0;
  const totalAbsent=processed.reduce((a,r)=>a+r.absences,0);
  const totalOTAll=processed.reduce((a,r)=>a+r.totalOT,0);
  const deptOT={};
  processed.forEach(r=>{deptOT[r.dept]=(deptOT[r.dept]||0)+r.totalOT;});
  const deptRanked=Object.entries(deptOT).sort((a,b)=>b[1]-a[1]);
  const topDept=deptRanked[0];
  const fmt=n=>'SGD '+Math.round(n).toLocaleString();
  const names=arr=>arr.map(r=>r.name).join(isZh?'、':' & ');

  const overLimit =processed.filter(r=>r.totalOT>params.otLimit);
  const atCap     =processed.filter(r=>r.totalOT<=params.otLimit&&Math.abs(r.otRemaining)<0.01);
  const critical3 =processed.filter(r=>r.otRemaining>0&&r.otRemaining<=3&&r.totalOT<params.otLimit);
  const warn5     =processed.filter(r=>r.otRemaining>3&&r.otRemaining<=5);
  const warn10    =processed.filter(r=>r.otRemaining>5&&r.otRemaining<=10);
  const pwmRisk   =processed.filter(r=>r.basic>0&&r.basic<1600);
  const absRisk   =processed.filter(r=>r.absences>0);
  const alLow     =processed.filter(r=>r.alRemaining>=0&&r.alRemaining<=3&&r.alUsed<=r.alEnt);

  // ── Section 1: Overall ────────────────────────────────────
  let sec1='';
  if(isZh){
    sec1+=`本月共处理 ${processed.length} 名员工薪酬，月度总支出 ${fmt(tp)}（含雇主 CPF 供款 ${fmt(tCPF)}）。`;
    sec1+=` 加班费合计 ${fmt(tot)}，占总薪酬的 ${otPct}%。`;
    if(topDept) sec1+=` 加班最集中于${topDept[0]}部门（${topDept[1]}h，占全员加班总时数 ${Math.round(topDept[1]/totalOTAll*100)}%）。`;
    if(otPct>=20) sec1+=` 加班成本比例较高，建议管理层关注排班合理性。`;
  } else {
    sec1+=`This month covered ${processed.length} employees with total gross payroll of ${fmt(tp)}, including ${fmt(tCPF)} in employer CPF contributions.`;
    sec1+=` Overtime costs totalled ${fmt(tot)}, representing ${otPct}% of gross payroll.`;
    if(topDept) sec1+=` The ${topDept[0]} department led overtime at ${topDept[1]}h — ${Math.round(topDept[1]/totalOTAll*100)}% of all OT worked this month.`;
    if(otPct>=20) sec1+=` This OT ratio warrants a management review of scheduling efficiency.`;
  }

  // ── Section 2: Compliance Risk — overview + deep-dive on worst only
  const sec2=[];
  const dangersAll=[...overLimit,...atCap,...critical3];
  const warnsAll=[...warn5,...warn10,...pwmRisk,...absRisk,...alLow];

  if(dangersAll.length===0&&warnsAll.length===0){
    sec2.push(isZh?'本月全员合规，无任何预警事项，可直接提交薪酬审批。':'All employees are fully compliant this month. No action required — payroll is ready for approval.');
  } else {
    const totalAtRisk=dangersAll.length+warnsAll.length;
    if(isZh)
      sec2.push(`本月共 <strong>${totalAtRisk}</strong> 名员工存在需要处理的事项，其中 <strong>${dangersAll.length}</strong> 名需立即行动，${warnsAll.length} 名需在本月内跨进。以下按严重程度说明。`);
    else
      sec2.push(`This month <strong>${totalAtRisk}</strong> employees require attention: <strong>${dangersAll.length}</strong> need immediate action and ${warnsAll.length} need follow-up before month-end.`);

    // Deep dive: only actual breaches
    overLimit.forEach(r=>{
      const over=parseFloat((r.totalOT-params.otLimit).toFixed(1));
      if(isZh)
        sec2.push(`<strong>${r.name}</strong>（${r.dept}，${r.age}岁）本月加班 ${r.totalOT}h，超出法定上限 ${params.otLimit}h 达 <strong>${over}h</strong>，已构成 Employment Act 违规——这是本月最严重的合规事件。须立即书面通知其经理停止一切加班安排，记录该事件并评估是否需向 MOM 提交报告；此类记录将影响公司未来申请豁免的资格。`);
      else
        sec2.push(`<strong>${r.name}</strong> (${r.dept}, age ${r.age}) worked ${r.totalOT}h OT — <strong>${over}h above</strong> the legal cap of ${params.otLimit}h, the most serious compliance breach this month. Issue a written instruction to cease all OT immediately and document the incident. Assess whether MOM reporting is required — repeat breaches can jeopardise the company’s future exemption eligibility.`);
    });

    // Brief: atCap and critical3
    [...atCap,...critical3].forEach(r=>{
      if(isZh)
        sec2.push(`<strong>${r.name}</strong>（${r.dept}）加班剩余 <strong>${r.otRemaining}h</strong>（已用 ${r.totalOT}h）——${Math.abs(r.otRemaining)<0.01?'已触及上限，即日起严禁任何加班':'处于高危区间，须今日与经理确认月末工时安排'}。`);
      else
        sec2.push(`<strong>${r.name}</strong> (${r.dept}): <strong>${r.otRemaining}h</strong> OT remaining (${r.totalOT}h used) — ${Math.abs(r.otRemaining)<0.01?'at the legal cap; no further OT permitted this month':'critical zone; line manager must confirm today that remaining workload fits within regular hours'}.`);
    });

    // Grouped: warn5 + warn10
    if(warn5.length||warn10.length){
      const grp=[...warn5,...warn10];
      const listZh=grp.map(r=>`${r.name}（剩${r.otRemaining}h）`).join('、');
      const listEn=grp.map(r=>`${r.name} (${r.otRemaining}h left)`).join(', ');
      if(isZh)
        sec2.push(`加班配额进入预警区间的员工：${listZh}。各部门经理须本周内评估月末工作量；其中剩余不足5h者，如有超时需求，须立即启动 MOM 事前豁免申请流程。`);
      else
        sec2.push(`OT quota in warning territory: ${listEn}. Department managers must review remaining workload this week. Those with under 5h left must initiate a MOM pre-approval exemption immediately if additional OT is foreseen — retrospective applications are not accepted.`);
    }

    // One-liner: PWM, absences, AL low
    pwmRisk.forEach(r=>{
      if(isZh)
        sec2.push(`<strong>${r.name}</strong>（${r.dept}）月薪 SGD ${r.basic} 低于 PWM 标准 SGD 1,600，HR 须在下次薪资周期前核实并补足差额，否则面临 MOM 罚款风险。`);
      else
        sec2.push(`<strong>${r.name}</strong> (${r.dept}): basic salary SGD ${r.basic} below the PWM floor of SGD 1,600 — HR must verify and rectify before the next pay period to avoid MOM penalties.`);
    });
    absRisk.forEach(r=>{
      if(isZh)
        sec2.push(`<strong>${r.name}</strong>（${r.dept}）本月有 ${r.absences} 天无记录缺勤，请在薪酬结算前核实出勤并决定是否扣薪。`);
      else
        sec2.push(`<strong>${r.name}</strong> (${r.dept}): ${r.absences} unaccounted absence day(s) — verify attendance and apply salary deduction if applicable before payroll closes.`);
    });
    alLow.forEach(r=>{
      if(isZh)
        sec2.push(`<strong>${r.name}</strong>（${r.dept}）年假仅剩 ${r.alRemaining} 天，提醒员工年内安排，避免作废。`);
      else
        sec2.push(`<strong>${r.name}</strong> (${r.dept}): ${r.alRemaining} AL day(s) remaining — remind employee to schedule leave before year-end.`);
    });
  }

  // ── Section 3: Recommendations (data-grounded) ───────────
  const recs=[];

  // Rec 1: dept OT management
  if(topDept&&totalOTAll>0){
    const dPct=Math.round(topDept[1]/totalOTAll*100);
    const target75=Math.round(params.otLimit*0.75);
    if(isZh)
      recs.push(`由 HR 联合<strong>${topDept[0]}</strong>部门经理在下月初安排排班优化会议：该部门本月承担全员加班总时数的 ${dPct}%（${topDept[1]}h），建议将个人月度加班预算上限设为 ${target75}h（法定上限的 75%），为应急情况保留 25% 缓冲，并在加班达到 ${Math.round(params.otLimit*0.6)}h 时触发自动提醒。`);
    else
      recs.push(`HR should schedule a scheduling optimisation meeting with the <strong>${topDept[0]}</strong> manager at the start of next month — this department drove ${dPct}% of total OT (${topDept[1]}h). Set a soft individual OT budget of ${target75}h (75% of the legal cap) to preserve a compliance buffer, and trigger automatic alerts at ${Math.round(params.otLimit*0.6)}h so action is taken well before the limit.`);
  }

  // Rec 2: most pressing individual follow-up
  const urgentPool=[...overLimit,...atCap,...critical3,...warn5];
  if(urgentPool.length>0){
    const r=urgentPool[0];
    if(isZh)
      recs.push(`将 <strong>${r.name}</strong> 的加班处理结果书面记录并存档（包括与部门经理的沟通记录、采取的行动及后续措施）。建议公司建立"加班预审批"制度：任何个人累计加班超过 ${Math.round(params.otLimit*0.8)}h 时，须由 HR 在系统内审批后方可继续安排加班，避免月末被动处理超标情况。`);
    else
      recs.push(`Document <strong>${r.name}</strong>'s OT situation in writing — record communications with the department manager, actions taken, and any follow-up. Use this as a trigger to implement an OT pre-approval workflow: any individual exceeding ${Math.round(params.otLimit*0.8)}h must obtain HR sign-off before further OT is scheduled, preventing month-end scrambles.`);
  } else {
    if(isZh)
      recs.push(`本月加班整体合规表现良好。建议在下月中旬进行一次全员加班中期盘点，识别是否有员工悄然进入预警区间，确保月末时仍有充足缓冲。`);
    else
      recs.push(`OT compliance is well-managed this month. Conduct a mid-month OT check-in next month to identify any employees drifting toward the warning threshold early, so corrective action can be taken with time to spare.`);
  }

  // Rec 3: systemic / forward-looking
  if(totalAbsent>0){
    if(isZh)
      recs.push(`完善缺勤管理流程：本月 ${totalAbsent} 天无记录缺勤增加了薪酬核实的复杂度。建议要求员工在缺勤当日下班前提交请假申请或情况说明；同时配置考勤系统在员工当天未打卡时自动发送提醒至 HR，实现缺勤零延迟处理。`);
    else
      recs.push(`Strengthen absence management: the ${totalAbsent} unaccounted absence day(s) this month added unnecessary payroll verification effort. Require employees to submit leave applications or explanations by end of day on any missed day, and configure the attendance system to send automatic HR alerts whenever a clock-in is missed — enabling real-time response rather than month-end discovery.`);
  } else if(pwmRisk.length>0){
    if(isZh)
      recs.push(`就 PWM 合规问题，建议 HR 在本月内完成受影响员工的职位核查及薪资补足方案，并在下月薪资周期中执行调整。同时审查其他薪资低于 SGD 2,000 的员工，确保无遗漏的 PWM 适用情形，形成完整的合规记录备查。`);
    else
      recs.push(`On the PWM issue, HR should complete the role review and salary correction plan within this month and implement the adjustment in the next pay cycle. Also audit all employees earning below SGD 2,000 to confirm no other PWM-applicable roles are missed — maintain a compliance record for MOM inspection purposes.`);
  } else {
    if(isZh)
      recs.push(`建议将本月分析结果纳入管理层月度例会汇报：重点呈现加班使用率（各部门占法定上限的百分比）、缺勤趋势和假期余额低于 3 天的员工名单。让管理层在薪酬结算前就能看到合规风险，从根本上将薪酬管理从"事后处理"转变为"事前预防"。`);
    else
      recs.push(`Incorporate this month's analysis into the management monthly review: present OT utilisation by department (as % of legal cap), absence trends, and employees with fewer than 3 leave days remaining. Giving leadership visibility before payroll closes fundamentally shifts payroll management from reactive firefighting to proactive compliance.`);
  }

  return {sec1,sec2,recs};
}

function renderAnalysis(body){
  const isZh=lang==='zh';
  const {sec1,sec2,recs}=buildAnalysis();
  const lbl=(t)=>`<p style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin:1.2rem 0 0.5rem;padding-bottom:4px;border-bottom:1px solid var(--border)">${t}</p>`;
  let html='';
  html+=lbl(isZh?'整体概况':'Overall Summary');
  html+=`<p style="margin-bottom:0.8rem;line-height:1.8">${sec1}</p>`;
  html+=lbl(isZh?'合规风险详情':'Compliance Risk Details');
  sec2.forEach(p=>{html+=`<p style="margin-bottom:0.75rem;line-height:1.75">${p}</p>`;});
  html+=lbl(isZh?'下月行动建议':'Recommendations for Next Month');
  const nums=isZh?['①','②','③']:['1.','2.','3.'];
  recs.forEach((r,i)=>{html+=`<p style="margin-bottom:0.75rem;line-height:1.75"><strong style="color:var(--accent2)">${nums[i]}</strong> ${r}</p>`;});
  body.className='ai-body';
  body.innerHTML=html;
}

async function runAI(){
  if(!processed.length)return;
  const btn=document.getElementById('aiBtn');btn.disabled=true;
  const panel=document.getElementById('aiPanel'),body=document.getElementById('aiBody');
  panel.style.display='block';
  body.className='ai-body loading';
  body.innerHTML=s('aiLoading')+'<span class="ai-cursor"></span>';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});

  const isZh=lang==='zh';
  const tp=Math.round(processed.reduce((a,r)=>a+r.grossPay,0));
  const tot=Math.round(processed.reduce((a,r)=>a+r.otPay,0));
  const otPct=tp>0?Math.round(tot/tp*100):0;
  const dangers=processed.filter(r=>r.worstLevel==='danger');
  const totalAbsent=processed.reduce((a,r)=>a+r.absences,0);
  const snap=`Month:${params.month}|Employees:${processed.length}|Gross:SGD${tp.toLocaleString()}|OT:SGD${tot.toLocaleString()}(${otPct}%)|Flags:${dangers.length}|Absences:${totalAbsent}d\n`+
    processed.map(r=>`${r.name}(${r.dept},age${r.age}):basic$${r.basic},OT${r.totalOT}/${params.otLimit}h(${r.otRemaining}h left),AL${r.alUsed}/${r.alEnt},SL${r.slUsed}/${r.slEnt},absent${r.absences}d,${r.worstLevel}`).join('\n');

  const prompt=isZh
    ?`你是资深新加坡薪酬合规顾问，为薪酬专员写月度分析报告。数据来自原始打卡记录精确计算。\n数据：\n${snap}\n\n请输出三部分（用**标题**标记，连贯叙述，2-3句，不用bullet）：\n\n**整体概况**：薪酬规模、加班费占比、成本结构，有具体数字。\n\n**合规风险详情**：按严重程度逐一说明每位有风险员工：当前状态（具体数字）、法律含义（违反什么规定）、今日/本周须采取的行动。包括PWM和缺勤问题。\n\n**下月行动建议**：3条针对本月数据的具体建议，有时间节点和负责人。\n\n语气专业直接，像真正了解新加坡劳动法的顾问。`
    :`You are a senior Singapore payroll compliance consultant writing a monthly analysis from raw clock-in/out data.\nData:\n${snap}\n\nWrite three sections (mark with **Title**, flowing prose, 2-3 sentences each, no bullet points):\n\n**Overall Summary**: Payroll size, OT cost ratio, cost structure with specific figures.\n\n**Compliance Risk Details**: Each at-risk employee in severity order — current status (specific numbers), legal implication under Singapore Employment Act/MOM, concrete action required today or this week. Include PWM and absence issues.\n\n**Recommendations for Next Month**: Three specific, data-grounded recommendations with suggested owners and timeframes.\n\nTone: direct and professional, like a consultant who genuinely knows Singapore labour law.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1300,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    if(text&&text.length>200){
      const lbl=(t)=>`<p style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin:1.2rem 0 0.5rem;padding-bottom:4px;border-bottom:1px solid var(--border)">${t}</p>`;
      const parts=text.split(/\*\*([^*]+)\*\*/);
      let html='';
      for(let i=0;i<parts.length;i++){
        if(i%2===1) html+=lbl(parts[i]);
        else if(parts[i].trim()) html+=parts[i].trim().split('\n').filter(l=>l.trim()).map(l=>`<p style="margin-bottom:0.75rem;line-height:1.8">${l}</p>`).join('');
      }
      body.className='ai-body';
      body.innerHTML=html||`<p style="line-height:1.8">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</p>`;
    } else {
      renderAnalysis(body);
    }
  }catch{
    renderAnalysis(body);
  }
  renderSidebar();
}

// Export
// ══════════════════════════════════════════════════════════════
function exportPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('PayClear — Monthly Payroll Report',14,16);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100);
  doc.text(`Period: ${params.month}  |  SG MOM Compliant  |  Generated: ${new Date().toLocaleString('en-SG')}`,14,23);
  const tp=processed.reduce((a,r)=>a+r.grossPay,0);
  const tc=processed.reduce((a,r)=>a+r.cpfEr,0);
  doc.setTextColor(0);doc.setFontSize(9);
  doc.text(`Employees: ${processed.length}  |  Gross: SGD ${Math.round(tp).toLocaleString()}  |  CPF Employer: SGD ${Math.round(tc).toLocaleString()}  |  Flags: ${processed.filter(r=>r.worstLevel==='danger').length}`,14,30);
  doc.autoTable({
    startY:35,
    head:[['ID','Name','Dept','Age','Basic','OT hrs','OT Pay','CPF Empr','Net Pay','AL','SL','Absent','Status']],
    body:processed.map(r=>[r.emp_id,r.name,r.dept,r.age,
      `$${r.basic.toLocaleString()}`,`${r.totalOT}h`,`$${Math.round(r.otPay).toLocaleString()}`,
      `$${Math.round(r.cpfEr).toLocaleString()}`,`$${Math.round(r.netPay).toLocaleString()}`,
      `${r.alUsed}/${r.alEnt}`,`${r.slUsed}/${r.slEnt}`,r.absences||0,
      r.worstLevel==='danger'?'⚠ FLAG':r.worstLevel==='warn'?'! Warn':'✓ OK']),
    styles:{fontSize:7,cellPadding:2},
    headStyles:{fillColor:[25,35,60],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,247,252]}
  });
  const flags=processed.filter(r=>r.worstLevel!=='ok');
  if(flags.length){
    doc.addPage();
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(0);
    doc.text('Compliance Alerts',14,16);
    doc.autoTable({startY:22,
      head:[['Employee','Dept','Level','Detail']],
      body:flags.flatMap(r=>r.alerts.filter(a=>a.level!=='ok').map(a=>[r.name,r.dept,a.level.toUpperCase(),a.msg])),
      styles:{fontSize:8},headStyles:{fillColor:[180,40,40],textColor:255}
    });
  }
  const aiText=document.getElementById('aiBody')?.innerText;
  if(aiText&&!aiText.includes('Analysing')&&!aiText.includes('正在分析')){
    doc.addPage();
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(0);
    doc.text('AI Analysis',14,16);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(doc.splitTextToSize(aiText,260),14,24);
  }
  doc.save(`PayClear_${params.month}.pdf`);showToast(s('t_pdf'));
}

function exportCSV(){
  const h=['ID','Name','Dept','Age','Basic','Normal hrs','OT hrs','OT Pay','CPF Employer','Net Pay','AL Used','AL Entitlement','SL Used','SL Entitlement','Absences','Status'];
  const rows=processed.map(r=>[r.emp_id,r.name,r.dept,r.age,Math.round(r.basic),
    r.normalHours,r.totalOT,Math.round(r.otPay),Math.round(r.cpfEr),Math.round(r.netPay),
    r.alUsed,r.alEnt,r.slUsed,r.slEnt,r.absences,
    r.worstLevel==='danger'?'FLAG':r.worstLevel==='warn'?'WARN':'OK']);
  dl([h,...rows].map(r=>r.join(',')).join('\n'),`PayClear_${params.month}.csv`);
  showToast(s('t_csv'));
}

// ══════════════════════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════════════════════
function updateParam(key,val){
  params[key]=parseFloat(val);
  const ids={ot:'otVal',otLimit:'otLimitVal',stdHours:'stdVal'};
  const suffixes={ot:(v)=>`×${v.toFixed(1)}`,otLimit:(v)=>`${v}h`,stdHours:(v)=>`${v}h`};
  const el=document.getElementById(ids[key]);
  if(el&&suffixes[key])el.textContent=suffixes[key](params[key]);
  if(processed.length)calculate();
}
function toggleLang(){
  lang=lang==='en'?'zh':'en';
  document.getElementById('langBtn').textContent=lang==='en'?'中文':'English';
  // Rebuild clock log filters on lang switch
  const lef=document.getElementById('logEmpFilter');if(lef)delete lef.dataset.built;
  processed=[...processed]; // force re-render alerts in new lang
  if(processed.length){processed=processed.map(r=>{r.alerts=buildAlerts(r.totalOT,r.otRemaining,r.alUsed,r.alEnt,r.slUsed,r.slEnt,r.alRemaining,r.absences,r.basic);r.worstLevel=r.alerts.some(a=>a.level==='danger')?'danger':r.alerts.some(a=>a.level==='warn')?'warn':'ok';return r;});}
  renderAll();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function bindDrop(zoneId,type){
  const z=document.getElementById(zoneId);if(!z)return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{
    e.preventDefault();z.classList.remove('drag');
    const file=e.dataTransfer.files[0];if(!file)return;
    const inp=z.querySelector('input[type=file]');
    const dt=new DataTransfer();dt.items.add(file);inp.files=dt.files;
    handleFile(inp,type);
  });
}
